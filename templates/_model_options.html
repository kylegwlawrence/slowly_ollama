{# `<option>` tags for the model dropdown. Renders directly into a
   `<select>` via the HTMX swap so the dropdown stays in sync with
   whatever models Ollama has installed.

   When the route can't reach Ollama, it passes `error` instead of a
   models list — we render one disabled option so the user sees a
   clear message rather than a frozen "Loading…" placeholder. The
   empty value combined with the form's `required` attribute keeps
   submission blocked.

   Phase 17b: when `prepend_blank` is set (project settings default-
   model picker), the rendered list starts with a "(no default)"
   option whose empty value signals "use the global default". #}
{% if error %}
  <option value="" disabled>{{ error }}</option>
{% else %}
  {% if prepend_blank|default(false) %}
    <option value="">(no default — use global)</option>
  {% endif %}
  {# Phase 25: data-thinking lets app.js show/hide the composer Think select
     for the selected model without a round trip. `thinking_models` is a set
     of capable model names (absent on the project-settings picker → treated
     as empty, so the attribute is simply "false" there). #}
  {% for model_name in models %}
    <option value="{{ model_name }}"
      data-thinking="{{ 'true' if model_name in (thinking_models | default([])) else 'false' }}"
      >{{ model_name }}</option>
  {% endfor %}
{% endif %}
