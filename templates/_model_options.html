{# `<option>` tags for the model dropdown. Renders directly into a
   `<select>` via the HTMX swap so the dropdown stays in sync with
   whatever models Ollama has installed.

   When the route can't reach Ollama, it passes `error` instead of a
   models list — we render one disabled option so the user sees a
   clear message rather than a frozen "Loading…" placeholder. The
   empty value combined with the form's `required` attribute keeps
   submission blocked. #}
{% if error %}
  <option value="" disabled>{{ error }}</option>
{% else %}
  {% for model_name in models %}
    <option value="{{ model_name }}">{{ model_name }}</option>
  {% endfor %}
{% endif %}
