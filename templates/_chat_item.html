{# One sidebar row. Clicking the link swaps the chat panel into #main.
   `id="chat-{{ chat.id }}"` lets PATCH and DELETE target this exact
   row via `hx-target="#chat-42"`. #}
<li id="chat-{{ chat.id }}" class="chat-item" data-chat-id="{{ chat.id }}">
  <a href="#"
     hx-get="/chats/{{ chat.id }}"
     hx-target="#main"
     hx-swap="innerHTML">{{ chat.name }}</a>
</li>
