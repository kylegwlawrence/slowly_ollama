{# One message bubble. The `data-message-id` lets the regenerate flow
   target the last assistant message via a CSS selector when it needs
   to replace the bubble in place. Jinja auto-escapes `content`, so a
   message containing `<script>` is safe.

   `swap_target` is set only when this template renders as the data
   payload of an SSE `done` event. The hx-swap-oob attribute then
   tells HTMX to take this element out-of-band and use it to replace
   whatever matches the selector (the streaming placeholder div) —
   so the placeholder disappears, replaced by the persisted message
   row. #}
<div id="message-{{ message.id }}"
     class="message message--{{ message.role }}"
     data-message-id="{{ message.id }}"
     data-role="{{ message.role }}"
     {%- if swap_target %} hx-swap-oob="outerHTML:{{ swap_target }}"{% endif %}>
  <div class="message__content">
    {%- if message.role == "assistant" %}
    {{ message.content | markdown | safe }}
    {%- else %}
    {{ message.content }}
    {%- endif %}
  </div>
  {%- if message.role == "assistant" %}
  {%- if message.prompt_tokens is not none or message.eval_tokens is not none %}
  {# Per-turn token counts reported by Ollama on the final stream chunk.
     `prompt_tokens` is what the model just saw for this turn — use it
     as "context size at this point in the conversation," not a sum
     across turns (history is double-counted otherwise). #}
  <div class="message__tokens"
       title="Tokens reported by Ollama for this turn. ctx = prompt the model just saw (system + history + new user msg); out = tokens generated.">
    {%- if message.prompt_tokens is not none %}
    <span class="message__tokens-ctx">{{ "{:,}".format(message.prompt_tokens) }} ctx</span>
    {%- endif %}
    {%- if message.eval_tokens is not none %}
    <span class="message__tokens-out">{{ "{:,}".format(message.eval_tokens) }} out</span>
    {%- endif %}
  </div>
  {%- endif %}
  {# Wall-clock generation time, rendered under the token counts in the same
     quiet monospaced style. Shown whenever it was recorded, independent of
     the token counts (Ollama can omit those on a prompt-cache hit). #}
  {%- if message.duration_ms is not none %}
  <div class="message__duration"
       title="Wall-clock time this response took to generate.">{{ message.duration_ms | duration }}</div>
  {%- endif %}
  {# Regenerate is rendered on every assistant bubble; CSS in
     base.html hides it unless the bubble is the last child of
     #messages AND not a streaming placeholder. That way only the
     most-recent finished assistant message shows the button. #}
  <button class="message__regenerate"
          type="button"
          aria-label="Regenerate response"
          hx-post="/chats/{{ message.conversation_id }}/regenerate"
          hx-target="closest .message"
          hx-swap="outerHTML">
    <span class="material-symbols-outlined">refresh</span>
    Regenerate
  </button>
  {%- endif %}
</div>
